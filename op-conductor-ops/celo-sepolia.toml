# Path to the SSL/TLS certificate file
#cert_path = "./cacert.pem"

# Network configurations
[networks]

[networks.celo-sepolia-cel2]
sequencers = [
    "0",
    "1",
    "reth-0",
]

# Sequencer configurations
[sequencers]

[sequencers.0]
raft_addr = "op-conductor-consensus-0:50050"
conductor_rpc_url = "http://localhost:8001/api/v1/namespaces/celo-sepolia-cel2/services/op-conductor-rpc-0:rpc/proxy/"
node_rpc_url = "http://localhost:8001/api/v1/namespaces/celo-sepolia-cel2/services/op-node-sequencer-rpc-0:rpc/proxy/"
voting = true

[sequencers.1]
raft_addr = "op-conductor-consensus-1:50050"
conductor_rpc_url = "http://localhost:8001/api/v1/namespaces/celo-sepolia-cel2/services/op-conductor-rpc-1:rpc/proxy/"
node_rpc_url = "http://localhost:8001/api/v1/namespaces/celo-sepolia-cel2/services/op-node-sequencer-rpc-1:rpc/proxy/"
voting = true

[sequencers.reth-0]
raft_addr = "op-conductor-reth-consensus-0:50050"
conductor_rpc_url = "http://localhost:8001/api/v1/namespaces/celo-sepolia-cel2/services/op-conductor-reth-rpc-0:rpc/proxy/"
node_rpc_url = "http://localhost:8001/api/v1/namespaces/celo-sepolia-cel2/services/op-node-reth-sequencer-rpc-0:rpc/proxy/"
voting = true
